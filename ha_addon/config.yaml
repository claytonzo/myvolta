name: "Volta Battery Monitor"
description: "Reads Volta VPS-1A50 BLE gateway and publishes battery data to MQTT."
version: "1.0.0"
slug: "volta_battery_monitor"
init: false
arch:
  - aarch64
startup: application
boot: auto
host_network: true
host_dbus: true
options:
  device_addr: "B532E5DA-6704-3640-9142-415175D91C45"
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  poll_interval: 30
schema:
  device_addr: str
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: str
  poll_interval: int
