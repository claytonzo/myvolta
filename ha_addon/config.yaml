name: "Volta Battery Monitor"
description: "Reads Volta VPS-1A50 BLE gateway and publishes battery data to MQTT."
version: "1.0.0"
slug: "volta_battery_monitor"
init: false
arch:
  - aarch64
startup: application
boot: auto
host_network: true
host_dbus: true
options:
  device_addr: "E8:EB:1B:F9:1A:50"
  mqtt_host: "localhost"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  poll_interval: 30
schema:
  device_addr: str
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: str
  poll_interval: int
